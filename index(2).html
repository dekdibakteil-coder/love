<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Page</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: #fff0f5;
    overflow:hidden;
}
.page{
    display:none;
    height:100vh;
    width:100vw;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
.page.active{
    display:flex;
}
button{
    padding:15px 25px;
    margin:10px;
    border:none;
    border-radius:20px;
    font-size:18px;
    cursor:pointer;
}
#runBtn{
    position:absolute;
    transition:0.2s;
}
.heart{
    position:absolute;
    font-size:24px;
    animation: floatUp 2s linear forwards;
}
@keyframes floatUp{
    from{transform:translateY(0); opacity:1;}
    to{transform:translateY(-200px); opacity:0;}
}
</style>
</head>
<body>

<div id="page1" class="page active">
    <img src="love1.gif" width="200">
    <h2>คิดถึงกันไหมคะคนสวย 💕</h2>
    <button id="runBtn">ไม่คิดถึง</button>
    <button onclick="love()">คิดถึงเหมือนกัน</button>
</div>

<div id="page2" class="page">
    <img src="love2.gif" width="200">
    <h2>เย้เทอน่ารักที่สุด 💖</h2>
</div>

<script>
const runBtn = document.getElementById("runBtn");

runBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 100);
    runBtn.style.left = x + "px";
    runBtn.style.top = y + "px";
});

function love(){
    document.getElementById("page1").classList.remove("active");
    document.getElementById("page2").classList.add("active");
    for(let i=0;i<20;i++){
        setTimeout(()=>{
            const heart=document.createElement("div");
            heart.className="heart";
            heart.innerHTML="💖";
            heart.style.left=Math.random()*window.innerWidth+"px";
            heart.style.top="80%";
            document.body.appendChild(heart);
            setTimeout(()=>heart.remove(),2000);
        },i*100);
    }
}
</script>

<audio autoplay loop hidden>
    <source src="music.mp3" type="audio/mpeg">
</audio>

</body>
</html>
